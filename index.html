<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Roadmap · Tread Athletics</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0c;
      color: #f7f6f2;
      min-height: 100vh;
    }

    /* ── Page header ───────────────────────────────────────── */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 200;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: #1c1c1b;
      border-bottom: 1px solid #292928;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .header-right { display: flex; align-items: center; gap: 12px; }

    /* Tread logo */
    .tread-logo svg {
      height: 26px;
      width: auto;
      display: block;
    }

    /* divider */
    .header-divider {
      width: 1px; height: 20px; background: #292928;
    }

    /* title */
    .header-title {
      font-size: 14px; font-weight: 500; color: #979795;
    }

    /* Today badge */
    .today-badge {
      height: 24px;
      padding: 0 10px;
      border-radius: 9999px;
      border: 1px solid #292928;
      background: transparent;
      font-size: 12px; font-weight: 500;
      color: #d6c281;
      display: flex; align-items: center;
    }

    /* Launch Labs badge */
    .ll-badge {
      height: 24px;
      padding: 0 10px;
      border-radius: 9999px;
      border: 1px solid #292928;
      font-size: 11px; font-weight: 600;
      color: #979795;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      display: flex; align-items: center;
    }

    /* ── Outer wrapper ─────────────────────────────────────── */
    .gantt-wrapper {
      padding: 20px;
      overflow-x: auto;
    }

    /* ── Board frame ───────────────────────────────────────── */
    .board {
      min-width: max-content;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #292928;
      background: #111110;
    }

    /* ── Column widths ─────────────────────────────────────── */
    .c-name  { width: 260px; min-width: 260px; }
    .c-dur   { width: 40px;  min-width: 40px; }
    .c-start { width: 76px;  min-width: 76px; }
    .c-end   { width: 76px;  min-width: 76px; }
    /* chart col is dynamic */

    /* ── Column header row ─────────────────────────────────── */
    .col-header {
      position: relative; /* JS will drive translateY for sticky effect */
      z-index: 100;
      display: flex;
      background: #1c1c1b;
      border-bottom: 1px solid #292928;
      height: 56px;
      will-change: transform;
      transition: box-shadow 0.15s;
    }
    .col-header.is-stuck {
      box-shadow: 0 4px 16px rgba(0,0,0,0.6);
    }
    .ch {
      padding: 0 12px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #585856;
      display: flex; align-items: flex-end; padding-bottom: 8px;
    }
    .ch-center { justify-content: center; }

    /* timeline header */
    .timeline-header {
      flex: 1;
      position: relative;
      background: #1c1c1b;
    }
    /* month strip */
    .month-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28px;
      display: flex;
      align-items: center;
    }
    .month-block {
      position: absolute;
      top: 0;
      height: 28px;
      display: flex; align-items: center;
      padding-left: 10px;
    }
    .month-block-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #bcbbb7;
    }
    .month-sep {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: #3d3d3c;
    }
    /* week strip */
    .week-strip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 26px;
      border-top: 1px solid #292928;
    }
    .week-tick {
      position: absolute;
      bottom: 0;
      height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 500;
      color: #585856;
    }
    /* today header marker */
    .today-header-mark {
      position: absolute;
      bottom: -2px;
      transform: translateX(-50%);
      font-size: 8px; font-weight: 700;
      letter-spacing: 0.5px;
      color: #d6c281;
      text-transform: uppercase;
    }

    /* ── Team section spacer ──────────────────────────────── */
    .team-spacer {
      height: 10px;
      background: #0d0d0c;
      border-top: 1px solid #292928;
    }

    .team-row {
      display: flex;
      background: #1c1c1b;
      border-top: 2px solid #3d3d3c;
      border-bottom: 1px solid #292928;
      height: 36px;
    }
    .team-label-cell {
      display: flex; align-items: center;
      padding: 0 16px 0 12px;
      gap: 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #bcbbb7;
      border-left: 3px solid #d6c281;
    }
    .team-dot { display: none; }
    .team-chart-bg {
      flex: 1;
      background: #1c1c1b;
      position: relative;
    }

    /* ── Task row ──────────────────────────────────────────── */
    .task-row {
      display: flex;
      align-items: stretch;
      height: 40px;
      border-bottom: 1px solid #292928;
      transition: background 0.1s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:nth-child(even) { background: #1c1c1b; }
    .task-row:nth-child(odd)  { background: #111110; }
    .task-row:hover { background: rgba(255,255,255,0.03) !important; }

    .task-name-cell {
      padding: 0 12px 0 20px;
      font-size: 12px; font-weight: 400;
      color: #bcbbb7;
      display: flex; align-items: center;
      white-space: nowrap; overflow: hidden;
    }
    .task-name-cell span { overflow: hidden; text-overflow: ellipsis; }

    .task-dur-cell {
      font-size: 11px; font-weight: 400;
      color: #585856;
      display: flex; align-items: center; justify-content: center;
    }
    .task-date-cell {
      padding: 0 10px;
      font-size: 10.5px; font-weight: 400;
      color: #585856;
      display: flex; align-items: center;
      font-variant-numeric: tabular-nums;
    }

    .task-chart-cell {
      flex: 1;
      position: relative;
      overflow: visible;
    }

    /* ── Grid lines ────────────────────────────────────────── */
    .grid-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: #292928;
      pointer-events: none;
    }
    .grid-line-month {
      background: #3d3d3c;
    }

    /* ── Today line ────────────────────────────────────────── */
    .today-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: #f7f6f2;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Gantt bar ─────────────────────────────────────────── */
    .gantt-bar {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 20px;
      border-radius: 8px;
      z-index: 2;
      transition: opacity 0.1s;
      min-width: 4px;
    }
    .gantt-bar.active { background: #d6c281; }
    .gantt-bar.future { background: #3d3d3c; border: 1px solid #585856; }
    .gantt-bar.past   { background: #292928; border: 1px solid #3d3d3c; }
    .gantt-bar.done   { background: #3d6b52; }
    .task-row:hover .gantt-bar { opacity: 0.85; }

    /* ── Footer legend ─────────────────────────────────────── */
    .legend {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 14px 20px;
      background: #1c1c1b;
      border-top: 1px solid #292928;
      font-size: 11px; font-weight: 500; color: #585856;
    }
    .li { display: flex; align-items: center; gap: 7px; }
    .li-swatch {
      width: 20px; height: 10px;
      border-radius: 4px;
    }
    .li-swatch.active { background: #d6c281; }
    .li-swatch.future { background: #3d3d3c; border: 1px solid #585856; }
    .li-swatch.past   { background: #292928; border: 1px solid #3d3d3c; }
    .li-swatch.done   { background: #3d6b52; }
    .li-today-line {
      width: 2px; height: 14px;
      background: #f7f6f2;
      border-radius: 1px;
    }
    .legend-right {
      margin-left: auto;
      font-size: 11px; font-weight: 400;
      color: #3d3d3c;
      letter-spacing: 0.3px;
    }
  </style>
</head>

  const d = toDate(s);

// ── Build ──────────────────────────────────────────────────
const root = document.getElementById('gantt-root');

// helper: make grid + today overlay for a row
function makeOverlay(h) {
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:absolute;inset:0;pointer-events:none;height:${h}px`;

  MONTHS.forEach((m, i) => {
    if (i === 0) return;
    const line = document.createElement('div');
    line.className = 'grid-line grid-line-month';
    line.style.left = px(dayOff(m.start)) + 'px';
    wrap.appendChild(line);
  });
  WEEKS.forEach(w => {
    const ws = w.toISOString().slice(0,10);
    const isMonth = MONTHS.some(m => m.start === ws);
    if (!isMonth) {
      const line = document.createElement('div');
      line.className = 'grid-line';
      line.style.left = px(dayOff(ws)) + 'px';
      wrap.appendChild(line);
    }
  });
  const tl = document.createElement('div');
  tl.className = 'today-line';
  tl.style.left = px(TODAY_OFF) + 'px';
  wrap.appendChild(tl);
  return wrap;
}

// ── Sticky timeline header (JS-driven to work inside overflow:hidden) ──
const PAGE_HDR_H = 56;
function updateStickyHeader() {
  const boardTop = root.getBoundingClientRect().top;
  const offset = Math.max(0, PAGE_HDR_H - boardTop);
  const maxOffset = root.offsetHeight - colHdr.offsetHeight;
  const clamped = Math.min(offset, maxOffset);
  colHdr.style.transform = clamped > 0 ? `translateY(${clamped}px)` : '';
  colHdr.classList.toggle('is-stuck', clamped > 0);
}
window.addEventListener('scroll', updateStickyHeader, { passive: true });
updateStickyHeader();
</script>
